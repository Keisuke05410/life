name: weather-notify

on:
  schedule:
    # 07:00 JST（= 22:00 UTC）。GitHub Actions の cron は UTC 固定。
    - cron: "0 22 * * *"
  workflow_dispatch: {} # 手動実行（動作確認用）

jobs:
  notify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weather
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: weather/package-lock.json
      - run: npm ci
      - run: npm run notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
