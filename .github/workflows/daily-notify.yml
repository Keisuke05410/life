name: daily-notify

on:
  schedule:
    # 07:00 JST（= 22:00 UTC）。GitHub Actions の cron は UTC 固定。
    - cron: "0 22 * * *"
  workflow_dispatch: {} # 手動実行（動作確認用）

jobs:
  notify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daily-notify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: daily-notify/package-lock.json
      - run: npm ci
      # ダッシュボード画像の日本語描画に必要（豆腐化防止）
      - run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      # HTML → PNG 用の chromium（+ OS 依存ライブラリ）
      - run: npx playwright install --with-deps chromium
      - run: npm run notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
